<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contract Risk Analyzer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f2f1ee;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --hint: #9e9e9e;
    --radius-md: 8px;
    --radius-lg: 12px;
    --high-bg: #FCEBEB; --high-border: #A32D2D; --high-text: #791F1F;
    --med-bg: #FAEEDA;  --med-border: #854F0B;  --med-text: #633806;
    --low-bg: #EAF3DE;  --low-border: #3B6D11;  --low-text: #27500A;
  }

  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 15px; line-height: 1.6; }

  .page { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 2rem; }

  /* ── Card ── */
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .card-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 12px; }

  /* ── Textarea ── */
  textarea { width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius-md); padding: 10px 12px; font-size: 14px; font-family: monospace; background: var(--surface); color: var(--text); resize: vertical; min-height: 180px; outline: none; }
  textarea:focus { border-color: #888; }

  /* ── Filters row ── */
  .filters { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }

  .toggle-group { display: flex; gap: 6px; }
  .tog { padding: 6px 16px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--surface); font-size: 13px; cursor: pointer; color: var(--muted); transition: all 0.12s; }
  .tog:hover { background: var(--surface2); }
  .tog.sel-HIGH { background: var(--high-bg); border-color: var(--high-border); color: var(--high-text); font-weight: 500; }
  .tog.sel-MEDIUM { background: var(--med-bg); border-color: var(--med-border); color: var(--med-text); font-weight: 500; }
  .tog.sel-LOW { background: var(--low-bg); border-color: var(--low-border); color: var(--low-text); font-weight: 500; }

  .topn-wrap { display: flex; align-items: center; gap: 8px; }
  .topn-wrap label { font-size: 13px; color: var(--muted); }
  input[type=number] { width: 64px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); padding: 6px 8px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; }
  input[type=number]:focus { border-color: #888; }

  /* ── Run button ── */
  .run-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 22px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--surface); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text); transition: background 0.12s; }
  .run-btn:hover { background: var(--surface2); }
  .run-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── Summary box ── */
  .summary-box { background: var(--surface2); border-radius: var(--radius-md); padding: 12px 14px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; font-family: monospace; color: var(--muted); border: 0.5px solid var(--border); }

  /* ── Risk table ── */
  .risk-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .risk-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 10px; border-bottom: 0.5px solid var(--border2); }
  .risk-table td { padding: 10px; border-bottom: 0.5px solid var(--border); vertical-align: top; }
  .risk-table tr:last-child td { border-bottom: none; }
  .risk-table tr:hover td { background: var(--surface2); }

  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .badge-HIGH { background: var(--high-bg); color: var(--high-text); }
  .badge-MEDIUM { background: var(--med-bg); color: var(--med-text); }
  .badge-LOW { background: var(--low-bg); color: var(--low-text); }

  .match-pill { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 20px; background: var(--surface2); border: 0.5px solid var(--border2); color: var(--hint); margin-left: 4px; }

  .snippet { font-family: monospace; font-size: 11px; color: var(--hint); margin-top: 3px; max-width: 360px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Clause cards ── */
  .clause-card { border: 0.5px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; overflow: hidden; }
  .clause-head { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; background: var(--surface); user-select: none; }
  .clause-head:hover { background: var(--surface2); }
  .clause-num { font-size: 11px; font-weight: 600; color: var(--muted); min-width: 32px; }
  .clause-name { font-size: 13px; flex: 1; }
  .clause-type { font-size: 11px; color: var(--hint); }
  .clause-body { display: none; padding: 10px 12px 12px; border-top: 0.5px solid var(--border); background: var(--surface); }
  .clause-body.open { display: block; }
  .clause-text { font-size: 12px; font-family: monospace; color: var(--muted); white-space: pre-wrap; margin-bottom: 10px; max-height: 160px; overflow-y: auto; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; border-bottom: 0.5px solid var(--border2); margin-bottom: 1.25rem; }
  .tab { padding: 7px 16px; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.12s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Status ── */
  .status { font-size: 13px; color: var(--muted); padding: 2rem; text-align: center; }
  .error { color: #A32D2D; background: var(--high-bg); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; }

  .spin { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; }
  .meta-pill { font-size: 12px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 12px; color: var(--muted); }
</style>
</head>
<body>
<div class="page">

  <h1>⚖ Contract Risk Analyzer</h1>
  <p class="subtitle">Paste your contract text → pick a risk level → run the full NLP pipeline</p>

  <!-- ── Input card ── -->
  <div class="card">
    <div class="card-title">Contract text</div>
    <textarea id="contract-text" placeholder="Paste raw contract text here...

Example:
1. TERMINATION
Either party may terminate this agreement without notice.

2. CONFIDENTIALITY
All confidential information shall remain protected..."></textarea>
  </div>

  <!-- ── Filters card ── -->
  <div class="card">
    <div class="card-title">Risk filter</div>
    <div class="filters">
      <div class="toggle-group">
        <button class="tog sel-HIGH" data-level="HIGH" onclick="selectLevel('HIGH')">High</button>
        <button class="tog" data-level="MEDIUM" onclick="selectLevel('MEDIUM')">Medium</button>
        <button class="tog" data-level="LOW" onclick="selectLevel('LOW')">Low</button>
        <button class="tog" data-level="ALL" onclick="selectLevel('ALL')">All levels</button>
      </div>
      <div class="topn-wrap">
        <label for="top-n">Show top</label>
        <input type="number" id="top-n" min="1" max="50" value="5" />
      </div>
      <button class="run-btn" id="run-btn" onclick="analyze()">
        ▶ Analyze
      </button>
    </div>
    <p style="font-size:12px; color:var(--hint); margin-top:10px;">Default: top 5 HIGH risks. Change filters and re-run anytime without re-entering text.</p>
  </div>

  <!-- ── Results ── -->
  <div id="results" style="display:none;">

    <div class="meta-row" id="meta-row"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('risks')">Filtered Risks</button>
      <button class="tab" onclick="switchTab('summary')">Executive Summary</button>
      <button class="tab" onclick="switchTab('clauses')">All Clauses</button>
    </div>

    <!-- Tab: Risks -->
    <div class="tab-panel active" id="tab-risks">
      <div class="card" style="padding:0; overflow:hidden;">
        <table class="risk-table" id="risk-table">
          <thead>
            <tr>
              <th style="width:72px">Level</th>
              <th>Risk</th>
              <th>Clause</th>
              <th>Pattern</th>
            </tr>
          </thead>
          <tbody id="risk-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Tab: Summary -->
    <div class="tab-panel" id="tab-summary">
      <div class="card">
        <div class="summary-box" id="summary-text"></div>
      </div>
    </div>

    <!-- Tab: Clauses -->
    <div class="tab-panel" id="tab-clauses">
      <div id="clauses-list"></div>
    </div>

  </div>

  <div id="loading" class="status" style="display:none;">
    <span class="spin">⟳</span>&nbsp; Running pipeline...
  </div>
  <div id="error-box" class="error" style="display:none;"></div>

</div>

<script>
let selectedLevel = 'HIGH';
let lastResult = null;

function selectLevel(level) {
  selectedLevel = level;
  document.querySelectorAll('.tog').forEach(b => {
    b.className = 'tog';
    if (b.dataset.level === level) {
      b.className = level === 'ALL' ? 'tog sel-HIGH' : `tog sel-${level}`;
    }
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['risks','summary','clauses'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function toggleClause(id) {
  const body = document.getElementById('cb-' + id);
  body.classList.toggle('open');
}

async function analyze() {
  const text = document.getElementById('contract-text').value.trim();
  if (!text) { showError('Please paste contract text first.'); return; }

  const topN = parseInt(document.getElementById('top-n').value) || 5;
  const btn = document.getElementById('run-btn');

  btn.disabled = true;
  btn.textContent = '⟳ Running...';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  const body = {
    text,
    top_n: topN,
  };
  if (selectedLevel !== 'ALL') body.risk_level = selectedLevel;

  try {
    const res = await fetch('/api/v1/risk-analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const data = await res.json();

    if (!res.ok) { showError(data.error || 'API error'); return; }

    lastResult = data;
    renderResults(data);

  } catch(e) {
    showError('Could not reach the API. Is app.py running on 127.0.0.1:8080?');
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Analyze';
    document.getElementById('loading').style.display = 'none';
  }
}

function renderResults(data) {
  // Meta row
  const totalRisks = data.clauses.reduce((s,c) => s + (c.risks||[]).length, 0);
  document.getElementById('meta-row').innerHTML = `
    <span class="meta-pill">📄 ${data.clauses.length} clauses extracted</span>
    <span class="meta-pill">⚠ ${totalRisks} total risks detected</span>
    <span class="meta-pill">🔍 ${data.filtered_risks.length} shown (${data.filter_applied})</span>
  `;

  // Risks tab
  const tbody = document.getElementById('risk-tbody');
  if (!data.filtered_risks.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--hint); padding:2rem;">No risks found for this filter.</td></tr>`;
  } else {
    tbody.innerHTML = data.filtered_risks.map(r => `
      <tr>
        <td><span class="badge badge-${r.level}">${r.level}</span></td>
        <td>
          <div style="font-weight:500; font-size:13px;">${r.risk}</div>
          <div class="snippet">${(r.matched_text||'').replace(/</g,'&lt;').substring(0,120)}</div>
        </td>
        <td style="color:var(--muted); font-size:12px;">${r.clause_number || ''} ${r.clause_title || ''}</td>
        <td>
          <code style="font-size:11px; background:var(--surface2); padding:2px 6px; border-radius:4px;">${r.pattern}</code>
          <span class="match-pill">${r.match_type}</span>
        </td>
      </tr>
    `).join('');
  }

  // Summary tab
  document.getElementById('summary-text').textContent = data.summary;

  // Clauses tab
  document.getElementById('clauses-list').innerHTML = data.clauses.map((c, i) => {
    const riskBadges = (c.risks||[]).map(r =>
      `<span class="badge badge-${r.level}" style="margin-right:4px">${r.level}: ${r.risk}</span>`
    ).join('');
    return `
      <div class="clause-card">
        <div class="clause-head" onclick="toggleClause(${i})">
          <span class="clause-num">${c.clause_number || '#'}</span>
          <span class="clause-name">${c.clause_title || '(untitled)'}</span>
          <span class="clause-type">${c.clause_type}</span>
          ${c.risks&&c.risks.length ? `<span class="badge badge-${c.risks[0].level}" style="font-size:10px;">${c.risks.length} risk${c.risks.length>1?'s':''}</span>` : ''}
        </div>
        <div class="clause-body" id="cb-${i}">
          <div class="clause-text">${c.text.replace(/</g,'&lt;')}</div>
          ${riskBadges || '<span style="font-size:12px; color:var(--hint);">No risks detected</span>'}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('results').style.display = 'block';
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = '✕ ' + msg;
  box.style.display = 'block';
  document.getElementById('loading').style.display = 'none';
}
</script>
</body>
</html>
